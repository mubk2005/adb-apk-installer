name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name=ADB-APK-Installer --hidden-import=tkinter --hidden-import=threading --hidden-import=subprocess --hidden-import=os main.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v3
      with:
        name: ADB-APK-Installer-Windows
        path: dist/*.exe
